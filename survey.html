<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анкета</title>
     <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="lang-theme-controls">
       <button id="lang-toggle" data-lang="ru">Русский</button>
       <button id="theme-toggle">Темная тема</button>
   </div>
    <div class="container">
        <h1 data-text-ru="Анкета" data-text-en="Survey">Анкета</h1>
        <div class="menu">
           <a href="index.html" data-text-ru="Главная" data-text-en="Main">Главная</a>
              <a href="software.html" data-text-ru="Программы" data-text-en="Programs">Программы</a>
            <a href="terms.html" data-text-ru="Словарь" data-text-en="Dictionary">Словарь</a>
              <a href="structure.html" data-text-ru="Схема" data-text-en="Scheme">Схема">Схема</a>
         </div>
       <div class="form">
          <h2 data-text-ru="Анкета" data-text-en="Survey">Анкета</h2>
           <form>
            <label for="name" data-text-ru="Пожалуйста, введите ваше имя:" data-text-en="Please enter your name:">Пожалуйста, введите ваше имя:</label>
                <input type="text" id="name" name="name">
             <label for="email" data-text-ru="e-mail:" data-text-en="e-mail:">e-mail:</label>
               <input type="email" id="email" name="email">

             <label for="group" data-text-ru="Укажите, к какой группе пользователей вы себя относите:" data-text-en="Indicate which group of users you belong to:">Укажите, к какой группе пользователей вы себя относите:</label>
             <select id="group" name="group">
                <option value="learner" data-text-ru="учащийся" data-text-en="learner">учащийся</option>
                <option value="student"  data-text-ru="студент" data-text-en="student">студент</option>
                 <option value="teacher"  data-text-ru="учитель" data-text-en="teacher">учитель</option>
             </select>

            <label for="internet_use" data-text-ru="Какие из сервисов Интернета вы используете наиболее часто:" data-text-en="Which Internet services do you use most often:">Какие из сервисов Интернета вы используете наиболее часто:</label>
            <select id="internet_use" name="internet_use">
                <option value="web" data-text-ru="web" data-text-en="web">web</option>
                <option value="e-mail" data-text-ru="e-mail" data-text-en="e-mail">e-mail</option>
                <option value="ftp"  data-text-ru="ftp" data-text-en="ftp">ftp</option>
             </select>

            <label for="more_info" data-text-ru="Какую еще информацию вы хотели бы видеть на нашем сайте?" data-text-en="What other information would you like to see on our website?">Какую еще информацию вы хотели бы видеть на нашем сайте?</label>
            <textarea id="more_info" name="more_info" rows="4"></textarea>
          </form>
         </div>
    </div>
    <script src="js/lang_theme_save.js"></script>
</body>
</html>
